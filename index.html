<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Master Pack Combat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@600&display=swap" rel="stylesheet"></noscript>
<style>
  :root{
    --red: #ff2d2d;
    --orange: #ff9d1f;
    --yellow: #ffe14d;
    --green: #3fae2c;
    --green-dark: #2c7a1f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    width: 100%;
    background: #1a1a1a;
    font-family: 'Cinzel', serif;
  }

  /* ---- Fond video (fixe, derriere tout le contenu) ---- */
  .bg-wrap{
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  #bgVideo{
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translate(calc(-50% + var(--px, 0px)), calc(-50% + var(--py, 0px))) scale(1.18);
    transition: transform 0.18s ease-out;
    object-fit: cover;
    filter: blur(10px) brightness(0.55);
  }

  .bg-yt-frame{
    position: absolute;
    top: 50%;
    left: 50%;
    width: 177.78vh;
    height: 56.25vw;
    min-width: 100vw;
    min-height: 100vh;
    transform: translate(calc(-50% + var(--px, 0px)), calc(-50% + var(--py, 0px))) scale(1.15);
    transition: transform 0.25s ease-out;
    filter: blur(10px) brightness(0.5);
    border: none;
    pointer-events: none;
  }

  .bg-fallback{
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0 6px, transparent 6px 12px),
      linear-gradient(180deg, #4a3325 0%, #6b4a30 40%, #2e2418 100%);
    filter: blur(6px) brightness(0.5);
    transform: translate(var(--px, 0px), var(--py, 0px)) scale(1.18);
    transition: transform 0.18s ease-out;
  }

  .overlay{
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.65) 100%);
  }

  /* ---- Petites particules flottantes ---- */
  .particles{
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .particle{
    position: absolute;
    bottom: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,180,70,0.9) 0%, rgba(255,120,40,0.5) 55%, transparent 75%);
    box-shadow: 0 0 6px rgba(255,150,60,0.7);
    animation-name: floatUp;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
    opacity: 0;
  }

  @keyframes floatUp{
    0%   { transform: translate(0, 0) scale(1); opacity: 0; }
    10%  { opacity: 0.9; }
    50%  { transform: translate(var(--drift, 20px), -50vh) scale(1); }
    90%  { opacity: 0.5; }
    100% { transform: translate(calc(var(--drift, 20px) * 2), -105vh) scale(0.4); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce){
    .particle{ animation: none; opacity: 0; }
  }

  /* ---- Barre de navigation ---- */
  .navbar{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
  }

  .navbar-side{
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1 1 0;
  }

  .navbar-side.right{
    justify-content: flex-end;
    padding-left: 30px;
  }

  .navbar-center{
    display: flex;
    align-items: center;
    gap: 42px;
    flex: 0 0 auto;
  }

  .nav-logo{
    height: 34px;
    width: 34px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .nav-link{
    position: relative;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(0.8rem, 1.6vw, 1rem);
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #eaeaea;
    text-decoration: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    padding-bottom: 4px;
    transition: color 0.1s ease;
    background: none;
    border: none;
    cursor: pointer;
  }

  .nav-link::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, var(--red), var(--orange));
    transition: width 0.12s ease;
  }

  .nav-link:hover{
    color: #ffffff;
  }

  .nav-link:hover::after{
    width: 100%;
  }

  .nav-link.active{
    color: #ffffff;
  }

  .nav-link.active::after{
    width: 100%;
  }

  .color-toggle-btn{
    background: none;
    border: none;
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
    padding: 4px 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    transition: transform 0.15s ease;
  }

  .color-toggle-btn:hover{
    transform: scale(1.12);
  }

  .palette-icon-img{
    width: 22px;
    height: 22px;
    display: block;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
  }

  .palette-icon-drawer{
    width: 26px;
    height: 26px;
  }

  /* ---- Bouton mode clair / sombre ---- */
  .theme-toggle-btn{
    position: fixed;
    bottom: 22px;
    right: 22px;
    z-index: 60;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--yellow);
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,0.45);
    transition: transform 0.15s ease, background 0.2s ease;
  }

  .theme-toggle-btn:hover{
    transform: scale(1.08);
  }

  /* ---- Message de confirmation du changement de theme ---- */
  .theme-toast{
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(0,0,0,0.88);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 11px 20px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 70;
    white-space: nowrap;
  }

  .theme-toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---- Mode clair : les barres passent en blanc ---- */
  body.light-theme .navbar{
    background: rgba(255,255,255,0.82);
  }

  body.light-theme .nav-link{
    color: #1a1a1a;
  }

  body.light-theme .hamburger-btn{
    color: #1a1a1a;
  }

  body.light-theme .mobile-drawer{
    background: #ffffff;
  }

  body.light-theme .drawer-link{
    color: #1a1a1a;
    border-bottom-color: rgba(0,0,0,0.1);
  }

  body.light-theme .color-panel{
    background: #f4f4f4;
    border-color: rgba(0,0,0,0.15);
  }

  body.light-theme .color-panel-title{
    color: #1a1a1a;
  }

  body.light-theme .color-panel-close{
    color: #555;
  }

  body.light-theme .hex-input{
    background: #ffffff;
    color: #111;
    border-color: rgba(0,0,0,0.25);
  }

  body.light-theme .color-panel-reset{
    background: rgba(0,0,0,0.06);
    border-color: rgba(0,0,0,0.2);
    color: #1a1a1a;
  }

  body.light-theme .color-panel-reset:hover{
    background: rgba(0,0,0,0.12);
  }

  body.light-theme .footer{
    background: rgba(255,255,255,0.88);
  }

  body.light-theme .footer p{
    color: #444;
  }

  body.light-theme .palette-icon-img{
    filter: invert(1) drop-shadow(0 2px 3px rgba(0,0,0,0.25));
  }

  /* ---- Le logo au-dessus du titre n'apparait pas sur PC ---- */
  @media (min-width: 769px){
    .hero-logo{
      display: none;
    }
  }

  /* ---- Panneau de personnalisation des couleurs ---- */
  .color-panel{
    position: fixed;
    top: 62px;
    right: 20px;
    z-index: 45;
    width: 232px;
    background: #050505;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 10px;
    padding: 18px 16px 16px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.65);
    display: none;
    flex-direction: column;
    gap: 14px;
  }

  .color-panel.open{
    display: flex;
  }

  .color-panel-title{
    margin: 0;
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #eee;
  }

  .color-panel-close{
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: #999;
    font-size: 0.95rem;
    cursor: pointer;
  }

  /* ---- Selecteur type Paint.NET ---- */
  .picker-row{
    display: flex;
    gap: 10px;
  }

  .sv-square-wrap{
    position: relative;
    width: 180px;
    height: 180px;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: crosshair;
    touch-action: none;
  }

  .sv-square-wrap canvas{
    display: block;
    width: 100%;
    height: 100%;
  }

  .sv-cursor{
    position: absolute;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.7), 0 0 3px rgba(0,0,0,0.6);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .hue-strip-wrap{
    position: relative;
    width: 20px;
    height: 180px;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    touch-action: none;
  }

  .hue-strip-wrap canvas{
    display: block;
    width: 100%;
    height: 100%;
  }

  .hue-cursor{
    position: absolute;
    left: -2px;
    top: 0;
    width: 24px;
    height: 4px;
    background: #fff;
    border: 1px solid #000;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
    transform: translateY(-50%);
    pointer-events: none;
  }

  .picker-bottom{
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .color-preview{
    width: 38px;
    height: 38px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.35);
    flex-shrink: 0;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
  }

  .hex-input{
    flex: 1;
    min-width: 0;
    background: #161616;
    border: 1px solid rgba(255,255,255,0.25);
    color: #f2f2f2;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 10px;
    border-radius: 4px;
  }

  .hex-input:focus{
    outline: none;
    border-color: rgba(255,255,255,0.55);
  }

  .color-panel-reset{
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #eee;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .color-panel-reset:hover{
    background: rgba(255,255,255,0.18);
  }

  @media (max-width: 768px){
    .color-panel{
      right: 14px;
      left: 14px;
      width: auto;
    }

    .sv-square-wrap{
      width: 100%;
      height: 160px;
    }

    .hue-strip-wrap{
      height: 160px;
    }
  }

  /* ---- Bouton hamburger (mobile uniquement) ---- */
  .hamburger-btn{
    display: none;
    background: none;
    border: none;
    color: #fff;
    font-size: 1.7rem;
    line-height: 1;
    cursor: pointer;
    padding: 4px 6px;
    z-index: 31;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  /* ---- Menu tiroir mobile ---- */
  .mobile-drawer{
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 78%;
    max-width: 300px;
    background: #000000;
    z-index: 40;
    transform: translateX(-100%);
    transition: transform 0.28s ease;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 78px 26px 30px;
    box-shadow: 6px 0 26px rgba(0,0,0,0.6);
  }

  .mobile-drawer.open{
    transform: translateX(0);
  }

  .drawer-logo{
    width: 54px;
    height: 54px;
    border-radius: 8px;
    margin-bottom: 26px;
  }

  .drawer-link{
    background: none;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    color: #eaeaea;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    width: 100%;
    text-align: left;
    padding: 15px 0;
    cursor: pointer;
  }

  .drawer-link:active{
    color: var(--orange);
  }

  .drawer-color-btn{
    border-bottom: none;
    text-align: center;
    align-self: center;
    margin-top: auto;
    padding-top: 34px;
    font-size: 1.7rem;
  }

  /* ---- Sections ---- */
  .section{
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 110px 24px 80px;
    scroll-margin-top: 70px;
  }

  #download{
    min-height: 100vh;
    padding-top: 24px;
  }

  .hero-logo{
    width: clamp(72px, 12vw, 120px);
    height: auto;
    margin-bottom: 18px;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55));
  }

  .title{
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    font-size: clamp(1.9rem, 4.8vw, 3.7rem);
    line-height: 1.15;
    margin: 0;
    background: linear-gradient(90deg, var(--red) 0%, var(--red) 35%, var(--orange) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.55));
    letter-spacing: 1px;
  }

  .subtitle{
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(0.9rem, 1.9vw, 1.3rem);
    color: var(--yellow);
    margin-top: 14px;
    margin-bottom: 50px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.65);
    letter-spacing: 2px;
  }

  .download-btn{
    position: relative;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(0.95rem, 2vw, 1.35rem);
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    letter-spacing: 2px;
    background: linear-gradient(180deg, #57c93f 0%, var(--green) 45%, var(--green-dark) 100%);
    border: 4px solid #1f2917;
    box-shadow:
      inset 4px 4px 0 rgba(255,255,255,0.25),
      inset -4px -4px 0 rgba(0,0,0,0.35),
      0 6px 0 #1a3a12,
      0 10px 18px rgba(0,0,0,0.55);
    padding: 16px 42px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    border-radius: 4px;
    transition: transform 0.08s ease;
  }

  .download-btn:hover{
    background: linear-gradient(180deg, #63d84a 0%, #46bd31 45%, #2c7a1f 100%);
  }

  .download-btn:active{
    transform: translateY(4px);
    box-shadow:
      inset 4px 4px 0 rgba(255,255,255,0.25),
      inset -4px -4px 0 rgba(0,0,0,0.35),
      0 2px 0 #1a3a12,
      0 4px 10px rgba(0,0,0,0.5);
  }

  @media (prefers-reduced-motion: reduce){
    .download-btn{ transition: none; }
  }

  .section-title{
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    font-size: clamp(1.3rem, 3vw, 2.1rem);
    color: var(--yellow);
    text-shadow: 0 2px 5px rgba(0,0,0,0.65);
    margin: 0 0 34px;
  }

  /* ---- Galerie d'images ---- */
  .gallery-grid{
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .gallery-item{
    background: rgba(20,20,20,0.55);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 22px rgba(0,0,0,0.45);
    cursor: zoom-in;
    padding: 0;
  }

  .gallery-item img{
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  /* ---- Trailer ---- */
  .trailer-card{
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 860px;
    text-decoration: none;
  }

  .trailer-thumb-wrap{
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 22px rgba(0,0,0,0.45);
  }

  .trailer-thumb{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.25s ease, filter 0.25s ease;
  }

  .trailer-card:hover .trailer-thumb{
    transform: scale(1.04);
    filter: brightness(0.75);
  }

  .trailer-play-overlay{
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.25);
    transition: background 0.25s ease;
  }

  .trailer-card:hover .trailer-play-overlay{
    background: rgba(0,0,0,0.35);
  }

  .trailer-play{
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--orange), var(--red));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.55);
    transition: transform 0.2s ease;
  }

  .trailer-card:hover .trailer-play{
    transform: scale(1.1);
  }

  .trailer-play::after{
    content: "";
    border-style: solid;
    border-width: 13px 0 13px 21px;
    border-color: transparent transparent transparent #fff;
    margin-left: 5px;
  }

  .trailer-title{
    margin: 18px 0 0;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(0.9rem, 1.9vw, 1.2rem);
    color: #f0f0f0;
    letter-spacing: 1px;
    text-align: center;
  }

  .trailer-premiere-date{
    margin: 8px 0 0;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.75rem, 1.5vw, 0.95rem);
    color: var(--yellow);
    letter-spacing: 1px;
    text-align: center;
  }

  /* ---- Pied de page ---- */
  .footer{
    position: relative;
    z-index: 2;
    width: 100%;
    background: rgba(0,0,0,0.75);
    padding: 22px 16px;
    text-align: center;
  }

  .footer p{
    margin: 0;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.3vw, 0.8rem);
    letter-spacing: 1px;
    color: #bdbdbd;
  }

  /* ---- Visionneuse d'images (lightbox) ---- */
  .lightbox{
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.94);
    display: none;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  .lightbox.open{
    display: flex;
  }

  .lightbox-stage{
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
  }

  .lightbox-stage img{
    max-width: 90vw;
    max-height: 90vh;
    user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
    cursor: grab;
    will-change: transform;
  }

  .lightbox-stage img.dragging{
    cursor: grabbing;
  }

  .lightbox-close{
    position: absolute;
    top: 18px;
    right: 18px;

  <button type="button" class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle light/dark mode">☼</button>
  <div class="theme-toast" id="themeToast"></div>

  <footer class="footer">
    <p>© 2026 Master Pack Combat — Tous droits réservés à Maste.</p>
  </footer>

  <!-- Visionneuse d'images plein ecran -->
  <div class="lightbox" id="lightbox">
    <button type="button" class="lightbox-close" id="lightboxClose">✕</button>
    <div class="lightbox-stage" id="lightboxStage">
      <img id="lightboxImg" src="" alt="" draggable="false" oncontextmenu="return false;">
    </div>
  </div>

  <script>
    /* ---------- Particules flottantes en fond ---------- */
    const particlesContainer = document.getElementById('particles');
    const PARTICLE_COUNT = 22;
    const particleEls = [];
    let currentParticleColor = '#ff7828';

    function hexToRgb(hex){
      const clean = hex.replace('#', '');
      const r = parseInt(clean.substring(0,2), 16);
      const g = parseInt(clean.substring(2,4), 16);
      const b = parseInt(clean.substring(4,6), 16);
      return { r, g, b };
    }

    function styleParticle(p, hex){
      const { r, g, b } = hexToRgb(hex);
      p.style.background = `radial-gradient(circle, rgba(${r},${g},${b},0.9) 0%, rgba(${r},${g},${b},0.5) 55%, transparent 75%)`;
      p.style.boxShadow = `0 0 6px rgba(${r},${g},${b},0.7)`;
    }

    for (let i = 0; i < PARTICLE_COUNT; i++){
      const p = document.createElement('div');
      p.className = 'particle';

      const size = 3 + Math.random() * 5;
      const left = Math.random() * 100;
      const duration = 8 + Math.random() * 10;
      const delay = Math.random() * 14;
      const drift = (Math.random() * 80 - 40) + 'px';

      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = left + 'vw';
      p.style.animationDuration = duration + 's';
      p.style.animationDelay = delay + 's';
      p.style.setProperty('--drift', drift);
      styleParticle(p, currentParticleColor);

      particlesContainer.appendChild(p);
      particleEls.push(p);
    }

    const DEFAULT_PARTICLE_COLOR = '#ff7828';

    function applyParticleColor(hex){
      currentParticleColor = hex;
      particleEls.forEach(function(p){ styleParticle(p, hex); });
    }

    /* ---------- Conversion couleurs (HSV <-> RGB <-> HEX) ---------- */
    function hsvToRgb(h, s, v){
      const c = v * s;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = v - c;
      let r = 0, g = 0, b = 0;
      if (h < 60)      { r = c; g = x; b = 0; }
      else if (h < 120){ r = x; g = c; b = 0; }
      else if (h < 180){ r = 0; g = c; b = x; }
      else if (h < 240){ r = 0; g = x; b = c; }
      else if (h < 300){ r = x; g = 0; b = c; }
      else             { r = c; g = 0; b = x; }
      return {
        r: Math.round((r + m) * 255),
        g: Math.round((g + m) * 255),
        b: Math.round((b + m) * 255)
      };
    }

    function rgbToHsv(r, g, b){
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const d = max - min;
      let h = 0;
      if (d !== 0){
        if (max === r) h = 60 * (((g - b) / d) % 6);
        else if (max === g) h = 60 * (((b - r) / d) + 2);
        else h = 60 * (((r - g) / d) + 4);
      }
      if (h < 0) h += 360;
      const s = max === 0 ? 0 : d / max;
      const v = max;
      return { h, s, v };
    }

    function rgbToHex(r, g, b){
      return '#' + [r, g, b].map(function(n){
        return n.toString(16).padStart(2, '0');
      }).join('');
    }

    /* ---------- Selecteur de couleur type Paint.NET ---------- */
    const colorPanel = document.getElementById('colorPanel');
    const colorToggleBtn = document.getElementById('colorToggleBtn');
    const colorToggleBtnMobile = document.getElementById('colorToggleBtnMobile');
    const colorPanelClose = document.getElementById('colorPanelClose');
    const colorResetBtn = document.getElementById('colorResetBtn');

    const svCanvas = document.getElementById('svCanvas');
    const svCtx = svCanvas.getContext('2d');
    const svCursor = document.getElementById('svCursor');
    const svSquareWrap = document.getElementById('svSquareWrap');

    const hueCanvas = document.getElementById('hueCanvas');
    const hueCtx = hueCanvas.getContext('2d');
    const hueCursor = document.getElementById('hueCursor');
    const hueStripWrap = document.getElementById('hueStripWrap');

    const colorPreview = document.getElementById('colorPreview');
    const hexInput = document.getElementById('hexInput');

    let pickerHue = 0, pickerSat = 1, pickerVal = 1;

    function drawHueStrip(){
      const w = hueCanvas.width, h = hueCanvas.height;
      const grad = hueCtx.createLinearGradient(0, 0, 0, h);
      const stops = [0, 60, 120, 180, 240, 300, 360];
      stops.forEach(function(hue){
        const rgb = hsvToRgb(hue, 1, 1);
        grad.addColorStop(hue / 360, 'rgb(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ')');
      });
      hueCtx.fillStyle = grad;
      hueCtx.fillRect(0, 0, w, h);
    }

    function drawSVSquare(){
      const w = svCanvas.width, h = svCanvas.height;
      const baseRgb = hsvToRgb(pickerHue, 1, 1);
      svCtx.fillStyle = 'rgb(' + baseRgb.r + ',' + baseRgb.g + ',' + baseRgb.b + ')';
      svCtx.fillRect(0, 0, w, h);

      const whiteGrad = svCtx.createLinearGradient(0, 0, w, 0);
      whiteGrad.addColorStop(0, 'rgba(255,255,255,1)');
      whiteGrad.addColorStop(1, 'rgba(255,255,255,0)');
      svCtx.fillStyle = whiteGrad;
      svCtx.fillRect(0, 0, w, h);

      const blackGrad = svCtx.createLinearGradient(0, 0, 0, h);
      blackGrad.addColorStop(0, 'rgba(0,0,0,0)');
      blackGrad.addColorStop(1, 'rgba(0,0,0,1)');
      svCtx.fillStyle = blackGrad;
      svCtx.fillRect(0, 0, w, h);
    }

    function updateCursorsFromState(){
      const svW = svSquareWrap.clientWidth, svH = svSquareWrap.clientHeight;
      svCursor.style.left = (pickerSat * svW) + 'px';
      svCursor.style.top = ((1 - pickerVal) * svH) + 'px';

      const hueH = hueStripWrap.clientHeight;
      hueCursor.style.top = ((pickerHue / 360) * hueH) + 'px';
    }

    function updatePreviewAndHex(hex){
      colorPreview.style.background = hex;
      hexInput.value = hex.toUpperCase();
    }

    function commitColorFromState(){
      const rgb = hsvToRgb(pickerHue, pickerSat, pickerVal);
      const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
      updatePreviewAndHex(hex);
      applyParticleColor(hex);
    }

    function setStateFromHex(hex){
      const rgb = hexToRgb(hex);
      const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
      pickerHue = hsv.h;
      pickerSat = hsv.s;
      pickerVal = hsv.v;
      drawSVSquare();
      updatePreviewAndHex(hex);
      applyParticleColor(hex);
    }

    // Initialisation avec la couleur par defaut (sans toucher au panneau, cache pour le moment)
    drawHueStrip();
    setStateFromHex(currentParticleColor);

    /* ---- Interaction : carre saturation / luminosite ---- */
    let draggingSV = false;

    function handleSVPointer(e){
      const rect = svSquareWrap.getBoundingClientRect();
      let x = (e.clientX - rect.left);
      let y = (e.clientY - rect.top);
      x = Math.max(0, Math.min(rect.width, x));
      y = Math.max(0, Math.min(rect.height, y));
      pickerSat = x / rect.width;
      pickerVal = 1 - (y / rect.height);
      updateCursorsFromState();
      commitColorFromState();
    }

    svSquareWrap.addEventListener('pointerdown', function(e){
      draggingSV = true;
      svSquareWrap.setPointerCapture(e.pointerId);
      handleSVPointer(e);
    });
    svSquareWrap.addEventListener('pointermove', function(e){
      if (draggingSV) handleSVPointer(e);
    });
    svSquareWrap.addEventListener('pointerup', function(){ draggingSV = false; });
    svSquareWrap.addEventListener('pointercancel', function(){ draggingSV = false; });

    /* ---- Interaction : barre de teinte ---- */
    let draggingHue = false;

    function handleHuePointer(e){
      const rect = hueStripWrap.getBoundingClientRect();
      let y = (e.clientY - rect.top);
      y = Math.max(0, Math.min(rect.height, y));
      pickerHue = (y / rect.height) * 360;
      drawSVSquare();
      updateCursorsFromState();
      commitColorFromState();
    }

    hueStripWrap.addEventListener('pointerdown', function(e){
      draggingHue = true;
      hueStripWrap.setPointerCapture(e.pointerId);
      handleHuePointer(e);
    });
    hueStripWrap.addEventListener('pointermove', function(e){
      if (draggingHue) handleHuePointer(e);
    });
    hueStripWrap.addEventListener('pointerup', function(){ draggingHue = false; });
    hueStripWrap.addEventListener('pointercancel', function(){ draggingHue = false; });

    /* ---- Champ hexadecimal ---- */
    hexInput.addEventListener('change', function(){
      let val = hexInput.value.trim();
      if (val[0] !== '#') val = '#' + val;
      if (/^#[0-9a-fA-F]{6}$/.test(val)){
        setStateFromHex(val);
      } else {
        hexInput.value = currentParticleColor.toUpperCase();
      }
    });

    /* ---- Ouverture / fermeture du panneau ---- */
    function openColorPanel(){
      closeDrawer();
      colorPanel.classList.add('open');
      updateCursorsFromState();
    }
    function closeColorPanel(){
      colorPanel.classList.remove('open');
    }

    colorToggleBtn.addEventListener('click', function(e){
      e.stopPropagation();
      colorPanel.classList.contains('open') ? closeColorPanel() : openColorPanel();
    });

    colorToggleBtnMobile.addEventListener('click', function(e){
      e.stopPropagation();
      openColorPanel();
    });

    colorPanelClose.addEventListener('click', closeColorPanel);

    document.addEventListener('click', function(e){
      if (!colorPanel.classList.contains('open')) return;
      if (colorPanel.contains(e.target) || e.target === colorToggleBtn || e.target === colorToggleBtnMobile) return;
      closeColorPanel();
    });

    colorResetBtn.addEventListener('click', function(){
      setStateFromHex(DEFAULT_PARTICLE_COLOR);
    });

    /* ---------- Navigation (clic = defilement, sans navigation externe) ---------- */
    function scrollToSection(targetId){
      const target = document.getElementById(targetId);
      if (target){
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    document.querySelectorAll('.nav-link, .drawer-link').forEach(function(btn){
      btn.addEventListener('click', function(){
        scrollToSection(btn.getAttribute('data-target'));
        closeDrawer();
      });
    });

    /* ---------- Menu tiroir mobile ---------- */
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileDrawer = document.getElementById('mobileDrawer');

    function openDrawer(){
      mobileDrawer.classList.add('open');
    }
    function closeDrawer(){
      mobileDrawer.classList.remove('open');
    }

    hamburgerBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if (mobileDrawer.classList.contains('open')){
        closeDrawer();
      } else {
        openDrawer();
      }
    });

    document.addEventListener('click', function(e){
      if (!mobileDrawer.classList.contains('open')) return;
      if (mobileDrawer.contains(e.target) || e.target === hamburgerBtn) return;
      closeDrawer();
    });

    /* ---------- Barre active pendant le defilement manuel ---------- */
    const navLinks = document.querySelectorAll('.nav-link');
    const sections = document.querySelectorAll('.section');

    let sectionOffsets = [];

    function cacheSectionOffsets(){
      sectionOffsets = Array.from(sections).map(function(section){
        return { id: section.id, top: section.offsetTop };
      });
    }

    function updateActiveNav(){
      const scrollPos = window.scrollY || window.pageYOffset;
      const probe = scrollPos + 130;
      let currentId = sectionOffsets.length ? sectionOffsets[0].id : '';

      sectionOffsets.forEach(function(section){
        if (probe >= section.top){
          currentId = section.id;
        }
      });

      navLinks.forEach(function(link){
        link.classList.toggle('active', link.getAttribute('data-target') === currentId);
      });
    }

    cacheSectionOffsets();
    window.addEventListener('scroll', updateActiveNav, { passive: true });
    window.addEventListener('resize', cacheSectionOffsets);
    updateActiveNav();

    /* ---------- Visionneuse d'images (zoom / deplacement) ---------- */
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxStage = document.getElementById('lightboxStage');
    const lightboxClose = document.getElementById('lightboxClose');

    let scale = 1, tx = 0, ty = 0;
    let isDragging = false, startX = 0, startY = 0;
    let lastTouchDist = 0;

    function applyImgTransform(){
      lightboxImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    }

    function resetImgTransform(){
      scale = 1; tx = 0; ty = 0;
      applyImgTransform();
    }

    function openLightbox(src, alt){
      lightboxImg.src = src;
      lightboxImg.alt = alt || '';
      resetImgTransform();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(){
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lightboxImg.src = '';
    }

    document.querySelectorAll('.gallery-item').forEach(function(item){
      item.addEventListener('click', function(){
        const imgEl = item.querySelector('img'); openLightbox(imgEl.src, imgEl.alt);
      });
    });

    lightboxClose.addEventListener('click', closeLightbox);

    lightboxStage.addEventListener('click', function(e){
      if (e.target === lightboxStage){
        closeLightbox();
      }
    });

    // Empecher tout enregistrement facile de l'image
    lightboxImg.addEventListener('dragstart', function(e){ e.preventDefault(); });
    lightboxImg.addEventListener('contextmenu', function(e){ e.preventDefault(); });

    // Zoom a la molette (souris)
    lightboxStage.addEventListener('wheel', function(e){
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.18 : -0.18;
      scale = Math.min(5, Math.max(1, scale + delta));
      if (scale === 1){ tx = 0; ty = 0; }
      applyImgTransform();
    }, { passive: false });

    // Deplacement a la souris
    lightboxImg.addEventListener('mousedown', function(e){
      if (scale <= 1) return;
      isDragging = true;
      lightboxImg.classList.add('dragging');
      startX = e.clientX - tx;
      startY = e.clientY - ty;
    });

    window.addEventListener('mousemove', function(e){
      if (!isDragging) return;
      tx = e.clientX - startX;
      ty = e.clientY - startY;
      applyImgTransform();
    });

    window.addEventListener('mouseup', function(){
      isDragging = false;
      lightboxImg.classList.remove('dragging');
    });

    // Double-clic pour reinitialiser le zoom
    lightboxImg.addEventListener('dblclick', function(){
      resetImgTransform();
    });

    // Support tactile : pincer pour zoomer, glisser pour deplacer
    function touchDistance(touches){
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    lightboxStage.addEventListener('touchstart', function(e){
      if (e.touches.length === 2){
        lastTouchDist = touchDistance(e.touches);
      } else if (e.touches.length === 1 && scale > 1){
        isDragging = true;
        startX = e.touches[0].clientX - tx;
        startY = e.touches[0].clientY - ty;
      }
    }, { passive: true });

    lightboxStage.addEventListener('touchmove', function(e){
      if (e.touches.length === 2){
        e.preventDefault();
        const dist = touchDistance(e.touches);
        const delta = (dist - lastTouchDist) * 0.01;
        scale = Math.min(5, Math.max(1, scale + delta));
        lastTouchDist = dist;
        if (scale === 1){ tx = 0; ty = 0; }
        applyImgTransform();
      } else if (e.touches.length === 1 && isDragging){
        e.preventDefault();
        tx = e.touches[0].clientX - startX;
        ty = e.touches[0].clientY - startY;
        applyImgTransform();
      }
    }, { passive: false });

    lightboxStage.addEventListener('touchend', function(e){
      if (e.touches.length === 0){
        isDragging = false;
      }
    });

    /* ---------- Mode clair / sombre ---------- */
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeToast = document.getElementById('themeToast');
    let isLightTheme = false;
    let toastTimer = null;

    function showThemeToast(message){
      themeToast.textContent = message;
      themeToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){
        themeToast.classList.remove('show');
      }, 2200);
    }

    themeToggleBtn.addEventListener('click', function(){
      isLightTheme = !isLightTheme;
      document.body.classList.toggle('light-theme', isLightTheme);
      themeToggleBtn.textContent = isLightTheme ? '☀' : '☼';
      showThemeToast(isLightTheme ? 'Switched to White Mode' : 'Switched to Black Mode');
    });

    /* ---------- Le fond suit la souris (ordinateur uniquement) ---------- */
    const bgWrapEl = document.querySelector('.bg-wrap');

    // Forcer la lecture de la video de fond, avec repli sur interaction utilisateur
    const bgVideoEl = document.getElementById('bgVideo');
    if (bgVideoEl){
      bgVideoEl.muted = true;
      const tryPlay = function(){
        const p = bgVideoEl.play();
        if (p !== undefined){
          p.catch(function(){
            const resume = function(){
              bgVideoEl.play();
              document.removeEventListener('touchstart', resume);
              document.removeEventListener('click', resume);
            };
            document.addEventListener('touchstart', resume, { once: true });
            document.addEventListener('click', resume, { once: true });
          });
        }
      };
      const loadVideoDeferred = function(){
        bgVideoEl.src = 'trailer-bg.mp4';
        bgVideoEl.autoplay = true;
        tryPlay();
        window.removeEventListener('load', loadVideoDeferred);
      };
      if (document.readyState === 'complete'){
        loadVideoDeferred();
      } else {
        window.addEventListener('load', loadVideoDeferred);
      }
      document.addEventListener('visibilitychange', function(){
        if (!document.hidden) tryPlay();
      });
    }
    const MAX_PARALLAX_OFFSET = 45;

    document.addEventListener('mousemove', function(e){
      if (window.innerWidth < 769) return;
      const relX = (e.clientX / window.innerWidth - 0.5) * 2;
      const relY = (e.clientY / window.innerHeight - 0.5) * 2;
      const px = relX * MAX_PARALLAX_OFFSET;
      const py = relY * MAX_PARALLAX_OFFSET;
      bgWrapEl.style.setProperty('--px', px + 'px');
      bgWrapEl.style.setProperty('--py', py + 'px');
    });
  </script>

</body>
